# =============================================================================
# QBE-style multi-lens portfolio optimiser - central configuration
# -----------------------------------------------------------------------------
# This file is the single source of truth for all assumptions. To move from
# dummy data to real data you mostly edit THIS file (yields, durations, ratings,
# baseline weights, capital factors, liability durations) and drop a real return
# history into data/processed/returns.csv. The code reads everything from here.
# =============================================================================

meta:
  base_currency: AUD
  start_date: "2000-01-31"
  end_date: "2024-12-31"
  random_seed: 7              # makes the dummy data reproducible

portfolio:
  risk_asset_target: 0.15     # baseline risk-asset share (core FI = 1 - this)
  risk_asset_scaled: 0.20     # scenario: scale risk assets up to 20%
  min_core_fixed_income: 0.80 # hard floor used as an optimisation constraint
  plan_return_target: 0.045   # annual "plan" return the business is held to
  trading_cost_bps: 5         # round-trip cost assumption (used in reporting)
  liability_ratio: 0.82       # insurance liabilities as a share of assets (surplus = 1 - this)
  risk_free: 0.025            # annual risk-free used in Sharpe (optimiser + reporting)

# Currency buckets. `liability_duration` is the duration of insurance
# liabilities in each currency (what the asset book must broadly match for ALM).
# `min`/`max` are optional bounds the optimiser can respect (share of total).
currencies:
  AUD: { liability_duration: 4.5, min: 0.30, max: 0.55 }
  USD: { liability_duration: 5.5, min: 0.20, max: 0.45 }
  GBP: { liability_duration: 7.0, min: 0.02, max: 0.15 }
  EUR: { liability_duration: 6.0, min: 0.02, max: 0.15 }
  NZD: { liability_duration: 3.5, min: 0.00, max: 0.08 }
  CAD: { liability_duration: 4.5, min: 0.00, max: 0.08 }

# Per-asset bound used by the constrained optimiser (max share of total book).
optimiser:
  default_max_weight: 0.25
  frontier_points: 30
  intra_max_weight: 0.40      # cap on any single sub-sleeve within an asset class
  factor_window: 36           # rolling window (months) for factor-beta analysis
  # Risk assets are only held in the "big four" currencies; smaller currencies
  # (NZD, CAD) carry core fixed income only. The optimiser forces risk-asset
  # weight to zero in any currency not listed here.
  risk_asset_currencies: ["AUD", "USD", "GBP", "EUR"]

# -----------------------------------------------------------------------------
# Sub-sleeve universe for the WITHIN-asset-class lens (intra_asset.py). The top-
# level SAA is fixed; here we ask whether a better *mix inside each class* (vs the
# default `benchmark_weight`) adds small, repeatable return per unit of risk.
# `intra_correlation` is the (high) correlation among sub-sleeves of one class.
# To use real data, replace these with index/sub-strategy returns and weights.
# -----------------------------------------------------------------------------
sub_sleeves:
  "Listed Equities":
    intra_correlation: 0.78
    components:
      - { name: "US Equity",         exp_return: 0.078, ann_vol: 0.150, benchmark_weight: 0.50 }
      - { name: "Europe Equity",     exp_return: 0.075, ann_vol: 0.165, benchmark_weight: 0.18 }
      - { name: "Australia Equity",  exp_return: 0.080, ann_vol: 0.155, benchmark_weight: 0.12 }
      - { name: "EM Equity",         exp_return: 0.090, ann_vol: 0.220, benchmark_weight: 0.12 }
      - { name: "Global Low-Vol",    exp_return: 0.072, ann_vol: 0.110, benchmark_weight: 0.08 }
  "IG Credit":
    intra_correlation: 0.82
    components:
      - { name: "A Financials",      exp_return: 0.048, ann_vol: 0.052, benchmark_weight: 0.30 }
      - { name: "A Industrials",     exp_return: 0.049, ann_vol: 0.050, benchmark_weight: 0.25 }
      - { name: "BBB Industrials",   exp_return: 0.055, ann_vol: 0.062, benchmark_weight: 0.20 }
      - { name: "BBB Utilities",     exp_return: 0.052, ann_vol: 0.054, benchmark_weight: 0.15 }
      - { name: "A Utilities",       exp_return: 0.047, ann_vol: 0.047, benchmark_weight: 0.10 }
  "High Yield":
    intra_correlation: 0.80
    components:
      - { name: "BB",                exp_return: 0.068, ann_vol: 0.085, benchmark_weight: 0.35 }
      - { name: "B",                 exp_return: 0.079, ann_vol: 0.108, benchmark_weight: 0.35 }
      - { name: "CCC",               exp_return: 0.097, ann_vol: 0.165, benchmark_weight: 0.20 }
      - { name: "BB Quality (ex-en)", exp_return: 0.066, ann_vol: 0.076, benchmark_weight: 0.10 }
  "AUD Sovereign":
    intra_correlation: 0.88
    components:
      - { name: "AUD 2y",            exp_return: 0.039, ann_vol: 0.020, benchmark_weight: 0.25 }
      - { name: "AUD 5y",            exp_return: 0.041, ann_vol: 0.050, benchmark_weight: 0.30 }
      - { name: "AUD 10y",           exp_return: 0.043, ann_vol: 0.082, benchmark_weight: 0.25 }
      - { name: "AUD 20y",           exp_return: 0.045, ann_vol: 0.135, benchmark_weight: 0.20 }
  "Private Credit":
    intra_correlation: 0.60
    components:
      - { name: "Direct Lending",    exp_return: 0.085, ann_vol: 0.060, benchmark_weight: 0.40 }
      - { name: "Mezzanine",         exp_return: 0.095, ann_vol: 0.092, benchmark_weight: 0.25 }
      - { name: "Special Situations", exp_return: 0.100, ann_vol: 0.120, benchmark_weight: 0.20 }
      - { name: "Asset-Based",       exp_return: 0.080, ann_vol: 0.050, benchmark_weight: 0.15 }
  # Structured credit is a strategic growth area (US & European securitised). It is
  # several universe sleeves, not one line item, so it is decomposed via
  # `parent_assets` - the question being the best same-risk MIX across the
  # securitised sub-sectors (CLOs by rating, ABS, RMBS, CMBS).
  "Structured Credit":
    intra_correlation: 0.70
    parent_assets: ["CLO AAA", "ABS", "RMBS", "CMBS", "CLO BBB"]
    components:
      - { name: "CLO AAA (US)",      exp_return: 0.059, ann_vol: 0.030, benchmark_weight: 0.28 }
      - { name: "CLO AA (EU)",       exp_return: 0.066, ann_vol: 0.042, benchmark_weight: 0.12 }
      - { name: "CLO BBB",           exp_return: 0.090, ann_vol: 0.090, benchmark_weight: 0.10 }
      - { name: "ABS (consumer)",    exp_return: 0.052, ann_vol: 0.035, benchmark_weight: 0.18 }
      - { name: "RMBS (prime)",      exp_return: 0.048, ann_vol: 0.034, benchmark_weight: 0.20 }
      - { name: "CMBS",              exp_return: 0.062, ann_vol: 0.058, benchmark_weight: 0.12 }

# -----------------------------------------------------------------------------
# Instantaneous stress scenarios (lens 2). Shocks are applied via each asset's
# rate duration, spread duration, equity beta and property beta.
#   rate_bps      : parallel govt-rate shock (basis points)
#   spread_bps    : credit-spread shock (basis points)
#   structured_bps: extra spread shock applied only to structured credit
#   hy_bps        : extra spread shock applied only to the sub-IG credit sleeves
#                   (high yield, mezzanine structured, private credit) - optional, default 0
#   equity_pct    : equity market move (e.g. -0.30 = -30%)
#   property_pct  : direct property/unlisted move
# Any omitted key defaults to 0, so scenarios can be added without touching code.
# -----------------------------------------------------------------------------
stress_scenarios:
  - { name: "Rates +100bp",        rate_bps: 100,  spread_bps: 0,   structured_bps: 0,   equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Rates -100bp",        rate_bps: -100, spread_bps: 0,   structured_bps: 0,   equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Credit +100bp",       rate_bps: 0,    spread_bps: 100, structured_bps: 0,   equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Credit +150bp",       rate_bps: 0,    spread_bps: 150, structured_bps: 0,   equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Credit +200bp",       rate_bps: 0,    spread_bps: 200, structured_bps: 0,   equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Equity -20%",         rate_bps: 0,    spread_bps: 0,   structured_bps: 0,   equity_pct: -0.20, property_pct: 0.00 }
  - { name: "Equity -30%",         rate_bps: 0,    spread_bps: 0,   structured_bps: 0,   equity_pct: -0.30, property_pct: 0.00 }
  - { name: "Property -15%",       rate_bps: 0,    spread_bps: 0,   structured_bps: 0,   equity_pct: 0.00, property_pct: -0.15 }
  - { name: "High Yield widening", rate_bps: 0,    spread_bps: 0,   structured_bps: 0,   hy_bps: 300, equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Structured +200bp",   rate_bps: 0,    spread_bps: 50,  structured_bps: 200, equity_pct: 0.00, property_pct: 0.00 }
  - { name: "Combined recession",  rate_bps: -75,  spread_bps: 200, structured_bps: 150, hy_bps: 150, equity_pct: -0.35, property_pct: -0.20 }
  - { name: "Inflation / rates up", rate_bps: 200, spread_bps: 75,  structured_bps: 50,  equity_pct: -0.10, property_pct: -0.05 }

# -----------------------------------------------------------------------------
# Simplified APRA / LAGIC-style asset risk charge (lens 5).
# NOT legally exact. `stress` is the prescribed stress loss for each capital
# category. The total charge aggregates correlated category losses, and a
# scenario panel gives the worst single-scenario loss for comparison.
# -----------------------------------------------------------------------------
lagic:
  stress_factors:        # prescribed stressed loss per capital category
    sovereign: 0.015
    cash: 0.000
    ig_credit: 0.040
    corporate_credit: 0.060
    high_yield: 0.130
    structured_senior: 0.030   # CLO AAA / ABS / RMBS
    structured_mezz: 0.110     # CLO BBB / CMBS
    private_credit: 0.150
    infra_debt: 0.060
    infra_equity: 0.300
    listed_equity: 0.350
    property: 0.250
    gold: 0.160               # commodity / safe-haven sleeve (no income, high price vol)
  # Correlation between category stresses for the diversified aggregate charge
  # (reported as a comparator; the binding charge is the worst single scenario).
  cross_correlation: 0.40
  # Scenario panel (LAGIC-style): a panel of 8 prescribed, deterministic scenarios.
  # Each scenario scales the prescribed stress per category. The asset risk charge
  # is the WORST of the 8 (the binding scenario) - no history needed to compute it.
  scenarios:
    - name: "Equity & property crash"
      multipliers: { listed_equity: 1.0, infra_equity: 1.0, property: 1.0, high_yield: 0.5, private_credit: 0.5, structured_mezz: 0.4 }
    - name: "Credit crisis"
      multipliers: { ig_credit: 1.0, corporate_credit: 1.0, high_yield: 1.0, structured_senior: 1.0, structured_mezz: 1.0, private_credit: 1.0, infra_debt: 0.7 }
    - name: "Broad recession"
      multipliers: { listed_equity: 0.9, infra_equity: 0.9, property: 0.8, high_yield: 0.9, private_credit: 0.8, structured_mezz: 0.8, corporate_credit: 0.7, ig_credit: 0.5, structured_senior: 0.5, infra_debt: 0.6, gold: 0.2 }
    - name: "Rates / inflation shock"
      multipliers: { sovereign: 1.0, ig_credit: 0.6, corporate_credit: 0.6, structured_senior: 0.5, structured_mezz: 0.5, infra_debt: 0.8, high_yield: 0.3, gold: 0.6 }
    - name: "IG spread widening"
      multipliers: { ig_credit: 1.0, corporate_credit: 1.0, structured_senior: 0.7, structured_mezz: 0.6, infra_debt: 0.6, high_yield: 0.5 }
    - name: "Structured credit shock"
      multipliers: { structured_senior: 1.0, structured_mezz: 1.0, high_yield: 0.6, private_credit: 0.4, ig_credit: 0.3, corporate_credit: 0.3 }
    - name: "Unlisted revaluation (yields up)"
      multipliers: { infra_equity: 1.0, property: 1.0, private_credit: 1.0, infra_debt: 0.8, corporate_credit: 0.3 }
    - name: "Severe equity crash"
      multipliers: { listed_equity: 1.0, infra_equity: 1.0, property: 0.6, high_yield: 0.7, structured_mezz: 0.5, private_credit: 0.6 }

# =============================================================================
# Asset universe. Each row carries everything every lens needs.
#   group           : core_fi | risk
#   yield           : annual carry / running yield
#   duration        : interest-rate (key-rate) duration, years
#   spread_duration : credit-spread duration, years
#   equity_beta     : sensitivity to equity-market shocks
#   property_beta   : sensitivity to property shocks
#   accounting      : P&L (FVTPL, liability-matching) | OCI (FVOCI, surplus)
#   capital_category: LAGIC bucket (keys above)
#   liquidity       : 1 (illiquid) .. 10 (cash-like)
#   exp_return,ann_vol: forward assumptions used to GENERATE dummy returns + MVO
#   baseline_weight : share of the total book in the baseline portfolio
# =============================================================================
assets:
  - { name: "AUD Sovereign",      group: core_fi, currency: AUD, rating: AAA, accounting: "P&L", capital_category: sovereign,         liquidity: 9,  yield: 0.041, duration: 5.0, spread_duration: 0.0, equity_beta: 0.00, property_beta: 0.0, exp_return: 0.041, ann_vol: 0.050, baseline_weight: 0.167 }
